services:
  backend:
    build: ./backend
    container_name: shd-backend
    restart: unless-stopped
    env_file: ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    build: ./frontend
    container_name: shd-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  uploads:
